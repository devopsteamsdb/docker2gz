name: Docker 2 Gz Releaser

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'

  pull_request:
    branches: [ main ]

concurrency:
  group: workflow-${{ github.head_ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v3

    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y_%m_%d_%H_%M')" >> $GITHUB_OUTPUT

    - name: Prepare Release Body
      id: release_body
      run: |
        echo "body<<EOF" >> $GITHUB_OUTPUT
        echo "Uploaded on ${{ steps.date.outputs.date }}" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "### Images included:" >> $GITHUB_OUTPUT
        while read -r image || [ -n "$image" ]; do
          image=$(echo "$image" | tr -d '\r' | xargs)
          [[ -z "$image" || "$image" =~ ^# ]] && continue
          echo "- \`$image\`" >> $GITHUB_OUTPUT
        done < docker-image.txt
        echo "EOF" >> $GITHUB_OUTPUT

    - name: docker pull images
      run: |
        while read -r image || [ -n "$image" ]; do
          image=$(echo "$image" | tr -d '\r' | xargs)
          [[ -z "$image" || "$image" =~ ^# ]] && continue
          echo "Pulling $image..."
          docker pull "$image"
        done < docker-image.txt

    - name: docker save images
      run: |
        while read -r image || [ -n "$image" ]; do
          image=$(echo "$image" | tr -d '\r' | xargs)
          [[ -z "$image" || "$image" =~ ^# ]] && continue
          image_string=$(echo "$image" | sed 's/\//_/g')
          echo "Saving $image to ${image_string}.gz..."
          docker save "$image" | gzip > "${image_string}.gz"
        done < docker-image.txt

    - name: Generate SHA256 checksums
      run: |
        while read -r image || [ -n "$image" ]; do
          image=$(echo "$image" | tr -d '\r' | xargs)
          [[ -z "$image" || "$image" =~ ^# ]] && continue
          image_string=$(echo "$image" | sed 's/\//_/g')
          sha256sum "${image_string}.gz" > "${image_string}.checksum.txt"
          cat "${image_string}.checksum.txt"
        done < docker-image.txt

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.run_number }}
        release_name: Release ${{ github.run_number }}
        body: ${{ steps.release_body.outputs.body }}

    - name: Upload .gz files
      uses: xresloader/upload-to-github-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        draft: false
        file: "*.gz"
        release_id: ${{ steps.create_release.outputs.id }}
        overwrite: true
        verbose: true

    - name: Upload checksums
      uses: xresloader/upload-to-github-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        draft: false
        file: "*.checksum.txt"
        release_id: ${{ steps.create_release.outputs.id }}
        overwrite: true
        verbose: true
