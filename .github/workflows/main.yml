name: Docker 2 Gz Releaser

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'

  pull_request:
    branches: [ main ]

concurrency:
  group: workflow-${{ github.head_ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v3

    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y_%m_%d_%H_%M')" >> $GITHUB_OUTPUT

    - name: Pull, Save and Clean Docker Images
      run: |
        mkdir -p release_assets
        while IFS= read -r image || [ -n "$image" ]; do
          # Ignore empty lines and comments
          [[ -z "$image" || "$image" =~ ^# ]] && continue
          # Trim whitespace
          image=$(echo "$image" | xargs)
          echo "Pulling $image..."
          docker pull "$image"
          
          # Generate safe filename by replacing / and : with _
          safe_name=$(echo "$image" | tr '/:' '_')
          tar_path="release_assets/${safe_name}.tar.gz"
          
          echo "Saving $image to $tar_path..."
          docker save "$image" | gzip > "$tar_path"
          
          echo "Removing $image from local Docker daemon to save space..."
          docker rmi "$image"
        done < docker-image.txt

    - name: Generate SHA256 Checksums
      run: |
        cd release_assets
        sha256sum *.tar.gz > sha256.txt
        cat sha256.txt

    - name: Create Release and Upload Assets
      uses: softprops/action-gh-release@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        tag_name: ${{ github.run_number }}
        name: Release ${{ github.run_number }}
        body: |
          Docker images released on ${{ steps.date.outputs.date }}
        files: |
          release_assets/*.tar.gz
          release_assets/sha256.txt
